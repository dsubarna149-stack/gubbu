<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorry Gubbu</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* ম্যাজিকাল ব্যাকগ্রাউন্ড */
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #ffc3a0, #ffafbd);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            overflow: hidden;
            flex-direction: column;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* মেইন টাইটেল */
        h1 {
            font-size: 4.5rem;
            color: #ffffff;
            text-shadow: 3px 3px 10px rgba(255, 50, 50, 0.6);
            z-index: 20;
            /* ভাসমান অ্যানিমেশন */
            animation: floatUpDn 3s ease-in-out infinite;
            text-align: center;
            margin-bottom: 10px;
        }

        @keyframes floatUpDn {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* নিচের রোমান্টিক মেসেজ */
        .love-text {
            font-size: 2.2rem;
            color: #ffffff;
            text-shadow: 2px 2px 8px rgba(200, 0, 50, 0.6);
            z-index: 20;
            text-align: center;
            opacity: 0;
            /* নিচ থেকে স্লাইড করে ওঠার অ্যানিমেশন */
            transform: translateY(30px);
            animation: slideUpFade 2s ease-out forwards;
            animation-delay: 1.5s;
        }

        @keyframes slideUpFade {
            to { opacity: 1; transform: translateY(0); }
        }

        /* চারদিকে ছড়িয়ে পড়া হার্ট */
        .particle {
            position: absolute;
            pointer-events: none;
            z-index: 10;
        }

        /* নতুন: র্যান্ডম "sorry" লেখার স্টাইল */
        .sorry-popup {
            position: absolute;
            color: rgba(255, 255, 255, 0.85);
            font-weight: bold;
            text-shadow: 2px 2px 8px rgba(255, 50, 50, 0.5);
            pointer-events: none;
            z-index: 15;
            animation: popUpFade 3s ease-in-out forwards;
        }

        @keyframes popUpFade {
            0% { opacity: 0; transform: scale(0.5) translateY(20px); }
            20% { opacity: 1; transform: scale(1.1) translateY(0); }
            80% { opacity: 1; transform: scale(1) translateY(0); }
            100% { opacity: 0; transform: scale(0.8) translateY(-20px); }
        }
    </style>
</head>
<body>

    <h1>Sorry Gubbu 🥺❤️</h1>
    <p class="love-text">i love you bou forever,and ever,and ever 💕</p>

    <script>
        // ১. ফায়ারওয়ার্কস ব্লাস্ট অ্যানিমেশন
        function explodeHearts() {
            for (let i = 0; i < 80; i++) {
                let heart = document.createElement('div');
                heart.innerHTML = ['❤️', '💖', '💕', '💗'][Math.floor(Math.random() * 4)];
                heart.className = 'particle';
                document.body.appendChild(heart);
                
                let angle = Math.random() * Math.PI * 2; 
                let velocity = 10 + Math.random() * 20; 
                let x = window.innerWidth / 2;
                let y = window.innerHeight / 2;
                let size = Math.random() * 2 + 1;
                
                heart.style.fontSize = size + 'rem';
                heart.style.left = x + 'px';
                heart.style.top = y + 'px';
                heart.style.transition = 'all 2.5s cubic-bezier(0.25, 1, 0.5, 1)';
                
                setTimeout(() => {
                    heart.style.transform = `translate(${Math.cos(angle) * velocity * 20}px, ${Math.sin(angle) * velocity * 20}px) scale(0) rotate(${Math.random() * 360}deg)`;
                    heart.style.opacity = '0';
                }, 50);
                
                setTimeout(() => heart.remove(), 2600);
            }
        }

        // ২. দুলতে দুলতে উপরে ওঠার অ্যানিমেশন (Swaying Hearts)
        function floatHearts() {
            let heart = document.createElement('div');
            heart.innerHTML = ['❤️', '💖', '💕'][Math.floor(Math.random() * 3)];
            heart.style.position = 'absolute';
            heart.style.bottom = '-10%';
            heart.style.left = Math.random() * 100 + 'vw';
            
            let size = Math.random() * 1.5 + 1;
            heart.style.fontSize = size + 'rem';
            heart.style.opacity = Math.random() * 0.5 + 0.5;
            heart.style.zIndex = '5';
            
            let duration = Math.random() * 3 + 4;
            
            heart.style.animation = `sway ${duration}s ease-in-out infinite alternate, moveUp ${duration + 2}s linear forwards`;
            
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), (duration + 2) * 1000);
        }

        // ৩. র্যান্ডম জায়গায় "sorry" ভেসে ওঠার ফাংশন
        function popUpSorry() {
            let sorryText = document.createElement('div');
            sorryText.innerHTML = 'sorry 🥺'; // আপনি চাইলে শুধু 'sorry' রাখতে পারেন
            sorryText.className = 'sorry-popup';
            
            // স্ক্রিনের র্যান্ডম পজিশন
            sorryText.style.left = Math.random() * 90 + 'vw';
            sorryText.style.top = Math.random() * 90 + 'vh';
            
            // র্যান্ডম সাইজ
            let size = Math.random() * 1.5 + 1.2;
            sorryText.style.fontSize = size + 'rem';
            
            document.body.appendChild(sorryText);
            
            // অ্যানিমেশন শেষ হলে মুছে ফেলা হবে (৩ সেকেন্ড পর)
            setTimeout(() => sorryText.remove(), 3000);
        }

        // ডায়নামিক CSS (দুলতে দুলতে ওঠার জন্য)
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes moveUp { to { bottom: 110%; } }
            @keyframes sway { 
                0% { transform: translateX(-30px) rotate(-15deg); } 
                100% { transform: translateX(30px) rotate(15deg); } 
            }
        `;
        document.head.appendChild(style);

        // পেজ লোড হওয়ার একটু পর ব্লাস্ট হবে
        setTimeout(explodeHearts, 500);

        // কন্টিনিউয়াসলি হার্ট দুলতে দুলতে উপরে উঠবে
        setInterval(floatHearts, 300);

        // কন্টিনিউয়াসলি র্যান্ডম জায়গায় "sorry" ভেসে উঠবে (প্রতি ৮০০ মিলিসেকেন্ড পর পর)
        setInterval(popUpSorry, 800);
    </script>

</body>
</html>
