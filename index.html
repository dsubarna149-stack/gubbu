<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorry Gubbu</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffe6e6; /* হালকা গোলাপি ব্যাকগ্রাউন্ড */
            font-family: 'Comic Sans MS', cursive, sans-serif;
            overflow: hidden;
            flex-direction: column;
            position: relative;
        }
        
        h1 {
            font-size: 4rem;
            color: #ff3333;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.2);
            z-index: 20;
            animation: heartbeat 1.5s infinite;
            text-align: center;
            margin-bottom: 20px;
        }

        .love-text {
            font-size: 2rem;
            color: #e84393;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.1);
            z-index: 20;
            text-align: center;
            margin-top: 0;
            font-weight: bold;
            opacity: 0; /* শুরুতে অদৃশ্য থাকবে */
            animation: slowFadeIn 3s ease-in forwards, glow 2s ease-in-out infinite alternate;
            animation-delay: 1s, 4s; /* ১ সেকেন্ড পর ফেড-ইন শুরু, ৪ সেকেন্ড পর গ্লো শুরু */
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.1); }
            30% { transform: scale(1); }
            45% { transform: scale(1.1); }
            60% { transform: scale(1); }
            100% { transform: scale(1); }
        }

        @keyframes glow {
            from { text-shadow: 0 0 5px #ff7675, 0 0 10px #ff7675; }
            to { text-shadow: 0 0 20px #d63031, 0 0 30px #d63031; }
        }

        @keyframes slowFadeIn {
            to { opacity: 1; }
        }

        .heart {
            position: absolute;
            bottom: -50px;
            color: red;
            animation: floatUp linear forwards;
            z-index: 10;
        }

        @keyframes floatUp {
            to {
                transform: translateY(-120vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* ব্লাস্ট হার্টের জন্য ট্র্যাজেক্টরি */
        @keyframes blastUpLeft { 
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(-30vw, -70vh) rotate(-180deg) scale(0); opacity: 0; }
        }
        @keyframes blastUpRight { 
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(30vw, -70vh) rotate(180deg) scale(0); opacity: 0; }
        }
        @keyframes blastLeft { 
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(-50vw, -10vh) rotate(-90deg) scale(0); opacity: 0; }
        }
        @keyframes blastRight { 
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(50vw, -10vh) rotate(90deg) scale(0); opacity: 0; }
        }
        @keyframes blastDownLeft { 
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(-30vw, 30vh) rotate(-270deg) scale(0); opacity: 0; }
        }
        @keyframes blastDownRight { 
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(30vw, 30vh) rotate(270deg) scale(0); opacity: 0; }
        }

    </style>
</head>
<body>

    <h1>Sorry Gubbu 🥺❤️</h1>
    
    <p class="love-text">i love you bou forever,and ever,and ever 💕</p>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            const size = Math.random() * 2 + 1;
            heart.style.fontSize = size + 'rem';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }

        function loveBlast() {
            const blastCenter = document.querySelector('.love-text');
            const blastRect = blastCenter.getBoundingClientRect();
            const centerX = blastRect.left + blastRect.width / 2;
            const centerY = blastRect.top + blastRect.height; // ব্লাস্ট লেখার নিচ থেকে হবে

            const trajectories = ['blastUpLeft', 'blastUpRight', 'blastLeft', 'blastRight', 'blastDownLeft', 'blastDownRight'];

            for (let i = 0; i < 60; i++) { // ৬০টি হার্ট একসাথে
                const heart = document.createElement('div');
                heart.classList.add('heart');
                heart.innerHTML = (i % 3 === 0) ? '💖' : (i % 3 === 1) ? '💕' : '❤️'; // বিভিন্ন হার্ট
                heart.style.left = centerX + 'px';
                heart.style.top = centerY + 'px';
                const size = Math.random() * 2 + 1.5;
                heart.style.fontSize = size + 'rem';
                
                // র্যান্ডম ট্র্যাজেক্টরি নির্বাচন
                const trajectory = trajectories[Math.floor(Math.random() * trajectories.length)];
                heart.style.animation = `${trajectory} ${Math.random() * 2 + 1.5}s ease-out forwards`;
                
                document.body.appendChild(heart);
                setTimeout(() => { heart.remove(); }, 4000);
            }
        }

        // শুরুতে ব্লাস্ট হবে (১.৫ সেকেন্ড পর)
        setTimeout(loveBlast, 1500);

        // এরপর কন্টিনিউয়াসলি হার্ট উড়তে থাকবে
        setInterval(createHeart, 150);
    </script>

</body>
</html>
