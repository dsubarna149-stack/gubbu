<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorry Gubbu</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* ম্যাজিকাল ব্যাকগ্রাউন্ড */
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #ffc3a0, #ffafbd);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            overflow: hidden;
            flex-direction: column;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* মেইন টাইটেল */
        h1 {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            font-size: 4.5rem;
            color: #ffffff;
            text-shadow: 3px 3px 10px rgba(255, 50, 50, 0.6);
            z-index: 20;
            animation: floatUpDn 3s ease-in-out infinite;
            text-align: center;
            margin-bottom: 10px;
        }

        @keyframes floatUpDn {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* প্রফেশনাল Serif ফন্ট */
        .love-text {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 2px 2px 8px rgba(200, 0, 50, 0.6);
            z-index: 20;
            text-align: center;
            opacity: 0;
            /* নিচ থেকে স্লাইড করে ওঠার অ্যানিমেশন */
            transform: translateY(30px);
            animation: slideUpFade 2s ease-out forwards;
            animation-delay: 1.5s;
            margin-bottom: 5px;
        }

        /* হ্যান্ডরিটেন Cursive ফন্ট "S+S" */
        .initials-text {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            color: #ffffff;
            text-shadow: 1px 1px 5px rgba(200, 0, 50, 0.4);
            z-index: 20;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUpFade 1.5s ease-out forwards;
            animation-delay: 2.5s;
        }

        @keyframes slideUpFade {
            to { opacity: 1; transform: translateY(0); }
        }

        /* চারদিকে ছড়িয়ে পড়া হার্ট */
        .particle {
            position: absolute;
            pointer-events: none;
            z-index: 10;
        }

        /* বড় গোলাপের ডিজাইন এবং অ্যানিমেশন */
        .rose-container {
            position: absolute;
            bottom: -300px; /* শুরুতে নিচ থেকে শুরু */
            z-index: 18; /* মেইন টেক্সটের নিচে কিন্তু ব্যাকগ্রাউন্ডের উপরে */
            animation: moveUpStop 2s ease-out forwards;
            animation-delay: 0.8s; /* ব্লাস্টের পর আসবে */
            pointer-events: none;
        }

        @keyframes moveUpStop {
            0% { bottom: -300px; }
            100% { bottom: 50%; transform: translateY(50%); } /* মাঝখানে থামবে */
        }

        .rose-icon {
            font-size: 15rem; /* বড় গোলাপ */
            /* hue-rotate ব্যবহার করে লাল গোলাপকে নীল করা হয়েছে */
            filter: drop-shadow(0 0 15px rgba(0,0,255,0.4)) hue-rotate(240deg);
            transition: transform 0.3s ease;
        }

        /* গোলাপ থেকে ছড়িয়ে পড়া "sorry" লেখার স্টাইল */
        .sorry-popup {
            position: absolute;
            color: rgba(255, 255, 255, 0.9);
            font-weight: bold;
            text-shadow: 2px 2px 8px rgba(0, 0, 255, 0.5); /* শ্যাডোটাও নীলচে করা হয়েছে */
            pointer-events: none;
            z-index: 25;
            animation: popUpFadeDisperse 3.5s ease-in-out forwards;
            font-family: 'Comic Sans MS', cursive, sans-serif;
        }

        @keyframes popUpFadeDisperse {
            0% { opacity: 0; transform: scale(0.1) translate(0, 0) rotate(0deg); }
            10% { opacity: 1; transform: scale(1.1) translate(0, -10px) rotate(0deg); }
            30% { opacity: 1; transform: scale(1) translate(var(--x-disperse), var(--y-disperse)) rotate(var(--rotate-disperse)); }
            80% { opacity: 0.8; }
            100% { opacity: 0; transform: scale(0.8) translate(var(--x-disperse), calc(var(--y-disperse) - 100px)) rotate(calc(var(--rotate-disperse) + 20deg)); }
        }
    </style>
</head>
<body>

    <h1>Sorry Gubbu 🥺❤️</h1>
    <p class="love-text">i love you bou forever,and ever,and ever 💕</p>
    <p class="initials-text">S+S</p> 

    <div class="rose-container">
        <div class="rose-icon">🌹</div> 
    </div>

    <script>
        // ১. ফায়ারওয়ার্কস ব্লাস্ট অ্যানিমেশন
        function explodeHearts() {
            for (let i = 0; i < 80; i++) {
                let heart = document.createElement('div');
                heart.innerHTML = ['❤️', '💖', '💕', '💗'][Math.floor(Math.random() * 4)];
                heart.className = 'particle';
                document.body.appendChild(heart);
                
                let angle = Math.random() * Math.PI * 2; 
                let velocity = 10 + Math.random() * 20; 
                let x = window.innerWidth / 2;
                let y = window.innerHeight / 2;
                let size = Math.random() * 2 + 1;
                
                heart.style.fontSize = size + 'rem';
                heart.style.left = x + 'px';
                heart.style.top = y + 'px';
                heart.style.transition = 'all 2.5s cubic-bezier(0.25, 1, 0.5, 1)';
                
                setTimeout(() => {
                    heart.style.transform = `translate(${Math.cos(angle) * velocity * 20}px, ${Math.sin(angle) * velocity * 20}px) scale(0) rotate(${Math.random() * 360}deg)`;
                    heart.style.opacity = '0';
                }, 50);
                
                setTimeout(() => heart.remove(), 2600);
            }
        }

        // ২. দুলতে দুলতে উপরে ওঠার অ্যানিমেশন
        function floatHearts() {
            let heart = document.createElement('div');
            heart.innerHTML = ['❤️', '💖', '💕'][Math.floor(Math.random() * 3)];
            heart.style.position = 'absolute';
            heart.style.bottom = '-10%';
            heart.style.left = Math.random() * 100 + 'vw';
            
            let size = Math.random() * 1.5 + 1;
            heart.style.fontSize = size + 'rem';
            heart.style.opacity = Math.random() * 0.5 + 0.5;
            heart.style.zIndex = '5';
            
            let duration = Math.random() * 3 + 4;
            
            heart.style.animation = `sway ${duration}s ease-in-out infinite alternate, moveUp ${duration + 2}s linear forwards`;
            
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), (duration + 2) * 1000);
        }

        // ৩. গোলাপ থেকে "sorry" ভেসে ওঠার ফাংশন
        function popUpSorry() {
            let sorryText = document.createElement('div');
            sorryText.innerHTML = 'sorry 🥺'; 
            sorryText.className = 'sorry-popup';
            
            let centerX = window.innerWidth / 2;
            let centerY = window.innerHeight / 2;

            sorryText.style.setProperty('--x-disperse', `${(Math.random() - 0.5) * 80 + 'vw'}`);
            sorryText.style.setProperty('--y-disperse', `${(Math.random() - 0.8) * 80 + 'vh'}`);
            sorryText.style.setProperty('--rotate-disperse', `${(Math.random() - 0.5) * 90 + 'deg'}`);

            sorryText.style.left = centerX + 'px';
            sorryText.style.top = centerY + 'px';
            
            let size = Math.random() * 1.5 + 1.2;
            sorryText.style.fontSize = size + 'rem';
            
            document.body.appendChild(sorryText);
            
            setTimeout(() => sorryText.remove(), 3500);
        }

        // ডায়নামিক CSS 
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes moveUp { to { bottom: 110%; } }
            @keyframes sway { 
                0% { transform: translateX(-30px) rotate(-15deg); } 
                100% { transform: translateX(30px) rotate(15deg); } 
            }
        `;
        document.head.appendChild(style);

        setTimeout(explodeHearts, 500);
        setInterval(floatHearts, 300);

        // গোলাপ উঠে আসার পর থেকে sorry ছড়াবে
        setTimeout(() => {
            setInterval(popUpSorry, 800);
        }, 3000); 
    </script>

</body>
</html>
